<!DOCTYPE html>
<html>
<head>
    <title>Kyoto Sentiment Engine</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 300px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏯 Kyoto Review Analyzer</h2>
        <input type="text" id="reviewInput" placeholder="Type a Japanese review here...">
        <button onclick="analyze()">Analyze</button>
        <div id="result"></div>
    </div>

    <script>
        async function analyze() {
            const review = document.getElementById('reviewInput').value;
            const response = await fetch(`/predict?review=${encodeURIComponent(review)}`);
            const data = await response.json();
            
            const resultDiv = document.getElementById('result');
            const color = data.sentiment === 'positive' ? 'green' : (data.sentiment === 'negative' ? 'red' : 'gray');
            resultDiv.style.color = color;
            resultDiv.innerText = `Result: ${data.sentiment.toUpperCase()}`;
        }
    </script>
</body>
</html>
